<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>家計管理アプリ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary:       #6366f1;
      --primary-dark:  #4f46e5;
      --primary-light: #a5b4fc;
      --violet:        #8b5cf6;
      --pink:          #ec4899;
      --accent:        #f59e0b;
      --danger:        #ef4444;
      --success:       #10b981;
      --bg:            #f1f5f9;
      --card:          #ffffff;
      --text:          #1e293b;
      --muted:         #64748b;
      --border:        #e2e8f0;
      --radius:        16px;
      --radius-lg:     24px;
      --shadow-sm:     0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
      --shadow:        0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.06);
      --shadow-lg:     0 10px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.08);
      --glow-primary:  0 0 0 3px rgba(99,102,241,.25);
      --glow-success:  0 0 0 3px rgba(16,185,129,.25);
      --glow-danger:   0 0 0 3px rgba(239,68,68,.25);
      --grad-primary:  linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      --grad-income:   linear-gradient(135deg, #10b981 0%, #34d399 100%);
      --grad-expense:  linear-gradient(135deg, #ef4444 0%, #f97316 100%);
      --grad-balance:  linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
      --grad-hero:     linear-gradient(145deg, #4f46e5 0%, #7c3aed 45%, #ec4899 100%);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:     #0f172a;
        --card:   #1e293b;
        --text:   #f1f5f9;
        --muted:  #94a3b8;
        --border: #334155;
        --shadow-sm: 0 1px 3px rgba(0,0,0,.4);
        --shadow:    0 4px 16px rgba(0,0,0,.4);
        --shadow-lg: 0 10px 40px rgba(0,0,0,.5);
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans JP', 'Hiragino Sans', sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ===== アニメーション ===== */
    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:.6; } }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
    @keyframes scaleIn  { from { opacity:0; transform:scale(.92); } to { opacity:1; transform:scale(1); } }
    @keyframes dotPop   { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }
    @keyframes barPulse { 0%,100%{opacity:1} 50%{opacity:.7} }

    .animate-fadeup   { animation: fadeUp .35s ease both; }
    .animate-scalein  { animation: scaleIn .25s ease both; }

    /* ===== PIN画面 ===== */
    #pin-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; background: var(--grad-hero); padding: 24px;
      position: relative; overflow: hidden;
    }
    #pin-screen::before, #pin-screen::after {
      content: ''; position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.06); pointer-events: none;
    }
    #pin-screen::before { width: 400px; height: 400px; top: -120px; right: -80px; }
    #pin-screen::after  { width: 300px; height: 300px; bottom: -80px; left: -60px; }

    .pin-logo-wrap {
      width: 72px; height: 72px; border-radius: 22px; margin-bottom: 16px;
      background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; box-shadow: 0 8px 24px rgba(0,0,0,.2);
      animation: scaleIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    #pin-screen h1 {
      color: #fff; font-size: 1.75rem; font-weight: 800; letter-spacing: -.02em;
      margin-bottom: 6px;
    }
    #pin-screen > p { color: rgba(255,255,255,.75); margin-bottom: 28px; font-size: .95rem; }

    .pin-box {
      background: var(--card); border-radius: var(--radius-lg); padding: 32px 28px;
      box-shadow: var(--shadow-lg); min-width: 320px; max-width: 360px; width: 100%;
      animation: fadeUp .4s ease .1s both;
    }
    .user-select { display: flex; gap: 10px; margin-bottom: 24px; }
    .user-btn {
      flex: 1; padding: 11px 8px; border: 2px solid var(--border); border-radius: 12px;
      background: var(--bg); cursor: pointer; font-size: .9rem; font-weight: 500;
      transition: all .2s; color: var(--muted);
    }
    .user-btn.active {
      border-color: var(--primary); background: rgba(99,102,241,.08);
      color: var(--primary); font-weight: 700;
      box-shadow: var(--glow-primary);
    }
    .pin-dots { display: flex; gap: 14px; justify-content: center; margin-bottom: 24px; }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--border); transition: all .2s;
    }
    .pin-dot.filled {
      background: var(--grad-primary); box-shadow: 0 2px 8px rgba(99,102,241,.4);
      animation: dotPop .2s ease;
    }
    .pin-pad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .pin-key {
      padding: 16px; border: none; border-radius: 14px; background: var(--bg);
      font-size: 1.4rem; font-weight: 600; cursor: pointer;
      transition: all .15s; color: var(--text);
    }
    .pin-key:hover  { background: rgba(99,102,241,.1); color: var(--primary); transform: scale(1.04); }
    .pin-key:active { transform: scale(.96); }
    .pin-key.del    { font-size: 1.1rem; color: var(--danger); }
    .pin-error { color: var(--danger); text-align: center; font-size: .88rem; margin-top: 12px; min-height: 20px; font-weight: 500; }
    .pin-error.shake { animation: shake .4s ease; }
    .pin-hint  { color: var(--muted); text-align: center; font-size: .78rem; margin-top: 10px; }

    /* ===== メインアプリ ===== */
    #app { display: none; max-width: 980px; margin: 0 auto; padding: 16px 16px 80px; }

    header {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: var(--radius); padding: 14px 20px;
      box-shadow: var(--shadow-sm); margin-bottom: 16px;
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-icon {
      width: 36px; height: 36px; border-radius: 10px; background: var(--grad-primary);
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -.02em; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .user-badge {
      background: var(--grad-primary); color: #fff; border-radius: 99px;
      padding: 5px 14px; font-size: .82rem; font-weight: 600;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 10px;
      padding: 5px 12px; cursor: pointer; font-size: .82rem; color: var(--muted);
      transition: all .15s;
    }
    .logout-btn:hover { background: var(--bg); border-color: var(--muted); }

    /* 月ナビ */
    .month-nav {
      display: flex; align-items: center; justify-content: center; gap: 16px;
      margin-bottom: 16px;
    }
    .month-nav button {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 7px 18px; cursor: pointer; font-size: .95rem; transition: all .15s;
      color: var(--text); box-shadow: var(--shadow-sm);
    }
    .month-nav button:hover { background: rgba(99,102,241,.08); border-color: var(--primary); color: var(--primary); }
    .month-nav span { font-size: 1.1rem; font-weight: 700; letter-spacing: -.01em; min-width: 100px; text-align: center; }

    /* サマリーカード */
    .summary-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    .summary-card {
      border-radius: var(--radius); padding: 20px 18px; position: relative; overflow: hidden;
      box-shadow: var(--shadow); color: #fff;
    }
    .summary-card.income-card  { background: var(--grad-income); }
    .summary-card.expense-card { background: var(--grad-expense); }
    .summary-card.balance-card { background: var(--grad-balance); }
    .summary-card::before {
      content: ''; position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.12); pointer-events: none;
    }
    .summary-card::after {
      content: ''; position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.08); pointer-events: none;
    }
    .income-card::before  { width:100px;height:100px; right:-20px; top:-30px; }
    .income-card::after   { width: 60px;height: 60px; right: 30px; bottom:-15px; }
    .expense-card::before { width: 90px;height: 90px; right:-15px; top:-20px; }
    .expense-card::after  { width: 50px;height: 50px; left: 20px; bottom:-10px; }
    .balance-card::before { width:110px;height:110px; right:-25px; top:-35px; }
    .balance-card::after  { width: 65px;height: 65px; left: 10px; bottom:-20px; }
    .card-label { font-size: .78rem; opacity: .85; margin-bottom: 8px; font-weight: 500; position: relative; z-index:1; }
    .card-emoji { font-size: 1.1rem; margin-right: 4px; }
    .card-value { font-size: 1.5rem; font-weight: 800; letter-spacing: -.03em; position: relative; z-index:1; }

    /* 通常カード */
    .card {
      background: var(--card); border-radius: var(--radius);
      padding: 20px; box-shadow: var(--shadow-sm);
    }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    @media (max-width: 640px) {
      .summary-cards { grid-template-columns: 1fr; }
      .main-grid { grid-template-columns: 1fr; }
      #app { padding-bottom: 90px; }
    }

    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 14px; letter-spacing: -.01em; }

    /* タブ（ボトムナビ風） */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 16px;
      background: var(--card); border-radius: var(--radius); padding: 6px;
      box-shadow: var(--shadow-sm);
    }
    .tab-btn {
      flex: 1; padding: 8px 6px; border: none; border-radius: 10px;
      background: none; cursor: pointer; font-size: .82rem; font-weight: 500;
      color: var(--muted); transition: all .2s; position: relative; font-family: inherit;
    }
    .tab-btn::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 0; height: 2px; background: var(--grad-primary); border-radius: 99px;
      transition: width .25s ease;
    }
    .tab-btn.active { background: rgba(99,102,241,.08); color: var(--primary); font-weight: 700; }
    .tab-btn.active::before { width: 60%; }

    /* 入力フォーム */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-full { grid-column: 1 / -1; }
    .form-row { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: .78rem; color: var(--muted); font-weight: 500; }
    input, select {
      padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 10px;
      font-size: .95rem; background: var(--bg); color: var(--text);
      transition: all .2s; font-family: inherit;
    }
    input:focus, select:focus {
      outline: none; border-color: var(--primary);
      box-shadow: var(--glow-primary); background: var(--card);
    }
    .type-toggle {
      display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 10px;
      overflow: hidden; margin-bottom: 12px;
    }
    .type-toggle button {
      flex: 1; padding: 9px; border: none; background: var(--bg);
      cursor: pointer; font-size: .9rem; font-weight: 500; transition: all .2s;
      font-family: inherit; color: var(--muted);
    }
    .type-toggle button.active.expense {
      background: var(--grad-expense); color: #fff; font-weight: 700;
      box-shadow: 0 2px 8px rgba(239,68,68,.3);
    }
    .type-toggle button.active.income {
      background: var(--grad-income); color: #fff; font-weight: 700;
      box-shadow: 0 2px 8px rgba(16,185,129,.3);
    }

    /* クイック入力ボタン */
    .quick-amounts { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
    .quick-btn {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: 99px;
      background: var(--bg); cursor: pointer; font-size: .78rem; font-weight: 600;
      color: var(--muted); transition: all .15s; font-family: inherit;
    }
    .quick-btn:hover {
      border-color: var(--primary); color: var(--primary);
      background: rgba(99,102,241,.08);
    }
    .quick-btn:active { transform: scale(.94); }

    .submit-btn {
      width: 100%; padding: 12px; background: var(--grad-primary); color: #fff;
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; margin-top: 10px; transition: all .2s; font-family: inherit;
      box-shadow: 0 4px 14px rgba(99,102,241,.4); letter-spacing: .01em;
    }
    .submit-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(99,102,241,.5); }
    .submit-btn:active { transform: translateY(0); }

    /* 取引リスト */
    .tx-list { max-height: 340px; overflow-y: auto; }
    .tx-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 6px; border-bottom: 1px solid var(--border);
      transition: background .15s; border-radius: 8px; margin: 0 -6px;
    }
    .tx-item:hover { background: var(--bg); }
    .tx-item:last-child { border-bottom: none; }
    .tx-left { display: flex; flex-direction: column; gap: 2px; }
    .tx-cat-badge {
      display: inline-flex; align-items: center; gap: 4px; font-size: .72rem;
      background: rgba(99,102,241,.1); color: var(--primary); border-radius: 99px;
      padding: 2px 8px; font-weight: 600; width: fit-content; margin-bottom: 1px;
    }
    .tx-note { font-size: .9rem; font-weight: 500; }
    .tx-meta { font-size: .7rem; color: var(--muted); }
    .tx-right { display: flex; align-items: center; gap: 8px; }
    .tx-amount { font-weight: 700; font-size: 1rem; }
    .tx-amount.income  { color: var(--success); }
    .tx-amount.expense { color: var(--danger); }
    .del-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: .82rem; padding: 4px 7px; border-radius: 8px; transition: all .15s;
    }
    .del-btn:hover { background: rgba(239,68,68,.1); color: var(--danger); }

    /* 予算バー */
    .budget-list { display: flex; flex-direction: column; gap: 14px; }
    .budget-row { display: flex; flex-direction: column; gap: 6px; }
    .budget-labels { display: flex; justify-content: space-between; font-size: .83rem; align-items: center; }
    .budget-cat { display: flex; align-items: center; gap: 6px; font-weight: 600; }
    .cat-icon { font-size: .95rem; }
    .budget-amounts { font-size: .8rem; color: var(--muted); }
    .budget-bar-bg {
      background: var(--bg); border-radius: 99px; height: 9px; overflow: hidden;
      box-shadow: inset 0 1px 2px rgba(0,0,0,.06);
    }
    .budget-bar {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--primary) 0%, var(--violet) 100%);
      transition: width .5s cubic-bezier(.34,1.56,.64,1);
    }
    .budget-bar.warn { background: linear-gradient(90deg, #f59e0b 0%, #fbbf24 100%); }
    .budget-bar.over {
      background: linear-gradient(90deg, var(--danger) 0%, #f97316 100%);
      animation: barPulse 1.2s ease infinite;
    }
    .budget-pct { font-size: .75rem; font-weight: 700; padding: 2px 7px; border-radius: 99px; }
    .budget-pct.ok   { background: rgba(99,102,241,.1);  color: var(--primary); }
    .budget-pct.warn { background: rgba(245,158,11,.15); color: #d97706; }
    .budget-pct.over { background: rgba(239,68,68,.1);  color: var(--danger); }

    /* チャート */
    .chart-wrap { position: relative; height: 230px; }

    .empty {
      color: var(--muted); font-size: .9rem; text-align: center;
      padding: 28px 0; display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .empty-icon { font-size: 2rem; opacity: .4; }

    /* 設定フォーム */
    .budget-settings { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .budget-settings .form-row { flex-direction: row; align-items: center; gap: 8px; }
    .budget-settings label { min-width: 84px; color: var(--text); font-size: .85rem; font-weight: 500; }
    .budget-settings input { width: 110px; }

    /* モーダル */
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 100;
      background: rgba(15,23,42,.5); backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .2s ease; }
    .modal-overlay.open .modal-sheet { animation: fadeUp .3s ease; }
    .modal-sheet {
      background: var(--card); border-radius: 24px 24px 0 0; width: 100%; max-width: 500px;
      padding: 16px 24px 32px; box-shadow: 0 -8px 40px rgba(0,0,0,.2);
    }
    .modal-handle {
      width: 40px; height: 4px; border-radius: 99px; background: var(--border);
      margin: 0 auto 20px; cursor: grab;
    }

    /* ユーティリティ */
    .text-success { color: var(--success); }
    .text-danger  { color: var(--danger); }
    .msg-area { margin-top: 8px; font-size: .85rem; font-weight: 500; min-height: 20px; }

    /* 設定アイテム */
    .setting-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 4px; border-bottom: 1px solid var(--border);
      cursor: pointer; border-radius: 10px; margin: 0 -4px;
      transition: background .15s;
    }
    .setting-item:last-child { border-bottom: none; }
    .setting-item:hover { background: var(--bg); }
    .setting-item-left { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .setting-item-icon {
      width: 34px; height: 34px; border-radius: 10px; background: var(--grad-primary);
      display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0;
    }
    .setting-arrow { color: var(--muted); font-size: 1.2rem; font-weight: 300; }

    /* ユーザー設定モーダル内 */
    .user-setting-section {
      border: 1.5px solid var(--border); border-radius: 14px; padding: 16px;
      margin-bottom: 14px;
    }
    .user-setting-section:last-child { margin-bottom: 0; }
    .user-setting-title {
      font-size: .85rem; font-weight: 700; color: var(--primary); margin-bottom: 12px;
      display: flex; align-items: center; gap: 6px;
    }
    .user-setting-row { display: flex; gap: 8px; align-items: flex-end; margin-bottom: 10px; }
    .user-setting-row:last-child { margin-bottom: 0; }
    .user-setting-row .form-row { flex: 1; }
    .save-btn {
      padding: 9px 16px; background: var(--grad-primary); color: #fff; border: none;
      border-radius: 10px; font-size: .85rem; font-weight: 600; cursor: pointer;
      white-space: nowrap; font-family: inherit; transition: all .2s;
      box-shadow: 0 2px 8px rgba(99,102,241,.35);
    }
    .save-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,.45); }
    .modal-scroll { max-height: 70vh; overflow-y: auto; padding-right: 2px; }
    .modal-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; letter-spacing: -.01em; }
    .modal-close-btn {
      position: absolute; top: 18px; right: 20px;
      background: var(--bg); border: none; border-radius: 99px;
      width: 30px; height: 30px; cursor: pointer; font-size: 1rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center; transition: all .15s;
    }
    .modal-close-btn:hover { background: var(--border); color: var(--text); }
    .modal-sheet { position: relative; }
  </style>
</head>
<body>

<!-- ===== PIN画面 ===== -->
<div id="pin-screen">
  <div class="pin-logo-wrap">💰</div>
  <h1>家計管理</h1>
  <p>ユーザーを選んでPINを入力</p>
  <div class="pin-box">
    <div class="user-select">
      <button class="user-btn active" id="btn-user1" onclick="selectUser('user1')">👤 ユーザー1</button>
      <button class="user-btn" id="btn-user2" onclick="selectUser('user2')">👤 ユーザー2</button>
    </div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinInput('0')">0</button>
      <button class="pin-key del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-hint">初回PIN: <strong>1234</strong>（設定から変更できます）</div>
  </div>
</div>

<!-- ===== メインアプリ ===== -->
<div id="app">
  <header>
    <div class="header-logo">
      <div class="header-icon">💰</div>
      <h1>家計管理</h1>
    </div>
    <div class="header-right">
      <span class="user-badge" id="current-user-label">ユーザー1</span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="month-nav">
    <button onclick="changeMonth(-1)">◀</button>
    <span id="month-label"></span>
    <button onclick="changeMonth(1)">▶</button>
  </div>

  <div class="summary-cards">
    <div class="summary-card income-card animate-fadeup" style="animation-delay:.05s">
      <div class="card-label"><span class="card-emoji">📈</span>収入</div>
      <div class="card-value" id="total-income">¥0</div>
    </div>
    <div class="summary-card expense-card animate-fadeup" style="animation-delay:.1s">
      <div class="card-label"><span class="card-emoji">📉</span>支出</div>
      <div class="card-value" id="total-expense">¥0</div>
    </div>
    <div class="summary-card balance-card animate-fadeup" style="animation-delay:.15s">
      <div class="card-label"><span class="card-emoji">💎</span>残高</div>
      <div class="card-value" id="total-balance">¥0</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('tab-main')">📝 記録</button>
    <button class="tab-btn" onclick="showTab('tab-budget')">🎯 予算</button>
    <button class="tab-btn" onclick="showTab('tab-chart')">📊 グラフ</button>
    <button class="tab-btn" onclick="showTab('tab-settings')">⚙️ 設定</button>
  </div>

  <!-- 記録・一覧タブ -->
  <div id="tab-main">
    <div class="main-grid">
      <div class="card animate-fadeup">
        <div class="section-title">収支を記録</div>
        <div class="type-toggle">
          <button class="active expense" id="btn-expense" onclick="setType('expense')">💸 支出</button>
          <button class="income" id="btn-income" onclick="setType('income')">💰 収入</button>
        </div>
        <div class="form-grid">
          <div class="form-row">
            <label>日付</label>
            <input type="date" id="tx-date" />
          </div>
          <div class="form-row">
            <label>金額 (円)</label>
            <input type="number" id="tx-amount" placeholder="例: 1500" min="0" />
          </div>
          <div class="form-row form-full">
            <label>クイック入力</label>
            <div class="quick-amounts">
              <button class="quick-btn" onclick="setAmount(100)">¥100</button>
              <button class="quick-btn" onclick="setAmount(500)">¥500</button>
              <button class="quick-btn" onclick="setAmount(1000)">¥1,000</button>
              <button class="quick-btn" onclick="setAmount(3000)">¥3,000</button>
              <button class="quick-btn" onclick="setAmount(5000)">¥5,000</button>
              <button class="quick-btn" onclick="setAmount(10000)">¥10,000</button>
            </div>
          </div>
          <div class="form-row">
            <label>カテゴリ</label>
            <select id="tx-category"></select>
          </div>
          <div class="form-row">
            <label>メモ</label>
            <input type="text" id="tx-note" placeholder="メモ（任意）" />
          </div>
        </div>
        <button class="submit-btn" onclick="addTransaction()">追加する</button>
      </div>

      <div class="card animate-fadeup" style="animation-delay:.05s">
        <div class="section-title">取引一覧</div>
        <div class="tx-list" id="tx-list"></div>
      </div>
    </div>
  </div>

  <!-- 予算管理タブ -->
  <div id="tab-budget" style="display:none">
    <div class="card">
      <div class="section-title">カテゴリ別予算</div>
      <div class="budget-list" id="budget-list"></div>
    </div>
  </div>

  <!-- グラフタブ -->
  <div id="tab-chart" style="display:none">
    <div class="main-grid">
      <div class="card">
        <div class="section-title">支出内訳</div>
        <div class="chart-wrap"><canvas id="pie-chart"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">月別推移</div>
        <div class="chart-wrap"><canvas id="bar-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- 設定タブ -->
  <div id="tab-settings" style="display:none">
    <div class="card" style="margin-bottom:16px">
      <div class="section-title">アカウント</div>
      <div class="setting-item" onclick="openModal('userModal')">
        <div class="setting-item-left">
          <div class="setting-item-icon">👤</div>
          <span>ユーザー設定</span>
        </div>
        <span class="setting-arrow">›</span>
      </div>
    </div>
    <div class="main-grid">
      <div class="card">
        <div class="section-title">PIN変更</div>
        <div class="form-grid">
          <div class="form-row form-full">
            <label>現在のPIN</label>
            <input type="password" id="old-pin" maxlength="4" placeholder="現在の4桁PIN" />
          </div>
          <div class="form-row form-full">
            <label>新しいPIN</label>
            <input type="password" id="new-pin" maxlength="4" placeholder="新しい4桁PIN" />
          </div>
          <div class="form-row form-full">
            <label>確認</label>
            <input type="password" id="confirm-pin" maxlength="4" placeholder="もう一度入力" />
          </div>
        </div>
        <button class="submit-btn" onclick="changePin()">PINを変更</button>
        <div id="pin-change-msg" class="msg-area"></div>
      </div>
      <div class="card">
        <div class="section-title">月次予算の設定</div>
        <div class="budget-settings" id="budget-settings"></div>
        <button class="submit-btn" onclick="saveBudgets()" style="margin-top:14px">保存</button>
      </div>

</div>

<!-- ===== ユーザー設定モーダル ===== -->
<div class="modal-overlay" id="userModal" onclick="closeModal('userModal')">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="closeModal('userModal')">✕</button>
    <div class="modal-title">👤 ユーザー設定</div>
    <div class="modal-scroll" id="user-settings-content"></div>
  </div>
</div>

<script>
// ===== カテゴリ定義 =====
const CAT_ICONS = { '食費':'🍽️','交通費':'🚃','光熱費':'💡','住居費':'🏠','通信費':'📱','医療費':'🏥','娯楽費':'🎮','衣服費':'👕','教育費':'📚','その他':'📦','給与':'💼','副収入':'🌿','ボーナス':'🎁','その他収入':'💵' };
const CATEGORIES_EXPENSE = ['食費','交通費','光熱費','住居費','通信費','医療費','娯楽費','衣服費','教育費','その他'];
const CATEGORIES_INCOME  = ['給与','副収入','ボーナス','その他収入'];
const DEFAULT_BUDGETS = { '食費':40000,'交通費':10000,'光熱費':15000,'住居費':80000,'通信費':8000,'医療費':5000,'娯楽費':10000,'衣服費':5000,'教育費':5000,'その他':5000 };
const DEFAULT_PIN = '1234';

function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getData() {
  let d = null;
  try { d = JSON.parse(localStorage.getItem('kakeibo_data')); } catch(e) {}
  if (!d || typeof d !== 'object') d = {};
  if (!d.users || typeof d.users !== 'object') d.users = {};
  if (!d.users.user1 || typeof d.users.user1 !== 'object') d.users.user1 = {};
  if (!d.users.user2 || typeof d.users.user2 !== 'object') d.users.user2 = {};
  if (!d.users.user1.name) d.users.user1.name = 'ユーザー1';
  if (!d.users.user2.name) d.users.user2.name = 'ユーザー2';
  if (!d.users.user1.pin)  d.users.user1.pin  = DEFAULT_PIN;
  if (!d.users.user2.pin)  d.users.user2.pin  = DEFAULT_PIN;
  if (!Array.isArray(d.transactions)) d.transactions = [];
  if (!d.budgets || typeof d.budgets !== 'object') d.budgets = JSON.parse(JSON.stringify(DEFAULT_BUDGETS));
  return d;
}
function saveData(d) { localStorage.setItem('kakeibo_data', JSON.stringify(d)); }

// ===== PIN認証 =====
let currentUser = 'user1';
let pinBuffer = '';

function selectUser(u) {
  currentUser = u;
  document.getElementById('btn-user1').classList.toggle('active', u === 'user1');
  document.getElementById('btn-user2').classList.toggle('active', u === 'user2');
  pinBuffer = ''; updateDots();
  document.getElementById('pin-error').textContent = '';
}

function pinInput(n) {
  if (pinBuffer.length >= 4) return;
  pinBuffer += n; updateDots();
  if (pinBuffer.length === 4) verifyPin();
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1); updateDots();
  document.getElementById('pin-error').textContent = '';
}

function updateDots() {
  for (let i = 0; i < 4; i++)
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
}

function verifyPin() {
  const data = getData();
  if (data.users[currentUser].pin === pinBuffer) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('current-user-label').textContent = data.users[currentUser].name;
    initApp();
  } else {
    const errEl = document.getElementById('pin-error');
    errEl.textContent = 'PINが違います';
    errEl.classList.remove('shake');
    void errEl.offsetWidth;
    errEl.classList.add('shake');
    pinBuffer = ''; updateDots();
  }
}

function logout() {
  document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  document.body.style.overflow = '';
  pinBuffer = ''; updateDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  destroyCharts();
}

// ===== アプリ =====
let currentYear, currentMonth, currentType = 'expense';
let pieChart = null, barChart = null;

function initApp() {
  const now = new Date();
  currentYear = now.getFullYear(); currentMonth = now.getMonth() + 1;
  document.getElementById('tx-date').value = now.toISOString().slice(0, 10);
  updateCategorySelect(); renderAll();
}

function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1)  { currentMonth = 12; currentYear--; }
  renderAll();
}

function setType(t) {
  currentType = t;
  document.getElementById('btn-expense').classList.toggle('active', t === 'expense');
  document.getElementById('btn-income').classList.toggle('active', t === 'income');
  document.getElementById('btn-expense').classList.toggle('expense', t === 'expense');
  document.getElementById('btn-income').classList.toggle('income', t === 'income');
  updateCategorySelect();
}

function updateCategorySelect() {
  const sel = document.getElementById('tx-category');
  const cats = currentType === 'expense' ? CATEGORIES_EXPENSE : CATEGORIES_INCOME;
  sel.innerHTML = cats.map(c => `<option value="${c}">${CAT_ICONS[c] || ''} ${c}</option>`).join('');
}

function setAmount(v) {
  document.getElementById('tx-amount').value = v;
  document.getElementById('tx-amount').focus();
}

function renderAll() {
  document.getElementById('month-label').textContent = `${currentYear}年${currentMonth}月`;
  const data = getData();
  const txs = monthlyTxs(data);
  renderSummary(txs); renderTxList(txs, data);
  renderBudget(txs, data); renderBudgetSettings(data);
}

function monthlyTxs(data) {
  return data.transactions.filter(t => {
    const d = new Date(t.date);
    return d.getFullYear() === currentYear && (d.getMonth() + 1) === currentMonth;
  });
}

function renderSummary(txs) {
  const inc = txs.filter(t => t.type === 'income').reduce((s,t) => s + t.amount, 0);
  const exp = txs.filter(t => t.type === 'expense').reduce((s,t) => s + t.amount, 0);
  document.getElementById('total-income').textContent  = '¥' + inc.toLocaleString();
  document.getElementById('total-expense').textContent = '¥' + exp.toLocaleString();
  const bal = inc - exp;
  document.getElementById('total-balance').textContent = (bal < 0 ? '-¥' : '¥') + Math.abs(bal).toLocaleString();
}

function renderTxList(txs, data) {
  const el = document.getElementById('tx-list');
  if (!txs.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📋</div>この月の記録はありません</div>';
    return;
  }
  const sorted = [...txs].sort((a,b) => new Date(b.date) - new Date(a.date));
  el.innerHTML = sorted.map(t => `
    <div class="tx-item">
      <div class="tx-left">
        <span class="tx-cat-badge">${CAT_ICONS[t.category] || ''}${escHtml(t.category)}</span>
        <span class="tx-note">${escHtml(t.note || '（メモなし）')}</span>
        <span class="tx-meta">${escHtml(t.date)} · ${escHtml(data.users[t.user]?.name || t.user)}</span>
      </div>
      <div class="tx-right">
        <span class="tx-amount ${t.type==='income'?'income':'expense'}">${t.type==='income'?'+':'-'}¥${t.amount.toLocaleString()}</span>
        <button class="del-btn" onclick="deleteTx('${escHtml(t.id)}')">✕</button>
      </div>
    </div>`).join('');
}

function renderBudget(txs, data) {
  const el = document.getElementById('budget-list');
  const expTxs = txs.filter(t => t.type === 'expense');
  el.innerHTML = CATEGORIES_EXPENSE.map(cat => {
    const budget = data.budgets[cat] || 0;
    const spent  = expTxs.filter(t => t.category === cat).reduce((s,t) => s + t.amount, 0);
    const pct    = budget > 0 ? Math.min(spent / budget * 100, 100) : 0;
    const rawPct = budget > 0 ? Math.round(spent / budget * 100) : 0;
    const cls    = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : '';
    const pctCls = pct >= 100 ? 'over' : pct >= 80 ? 'warn' : 'ok';
    return `<div class="budget-row">
      <div class="budget-labels">
        <span class="budget-cat"><span class="cat-icon">${CAT_ICONS[cat]||''}</span>${cat}</span>
        <span style="display:flex;align-items:center;gap:6px">
          <span class="budget-amounts">¥${spent.toLocaleString()} / ¥${budget.toLocaleString()}</span>
          <span class="budget-pct ${pctCls}">${rawPct}%</span>
        </span>
      </div>
      <div class="budget-bar-bg"><div class="budget-bar ${cls}" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function renderBudgetSettings(data) {
  const el = document.getElementById('budget-settings');
  el.innerHTML = CATEGORIES_EXPENSE.map(cat => `
    <div class="form-row">
      <label>${CAT_ICONS[cat]||''} ${cat}</label>
      <input type="number" id="budget-${cat}" value="${data.budgets[cat] || 0}" min="0" />
    </div>`).join('');
}

// ===== チャート =====
function destroyCharts() {
  if (pieChart) { pieChart.destroy(); pieChart = null; }
  if (barChart) { barChart.destroy(); barChart = null; }
}

function renderCharts(data) {
  destroyCharts(); renderPie(data); renderBar(data);
}

function renderPie(data) {
  const txs = monthlyTxs(data).filter(t => t.type === 'expense');
  const map = {};
  txs.forEach(t => { map[t.category] = (map[t.category] || 0) + t.amount; });
  const labels = Object.keys(map);
  const values = Object.values(map);
  const colors = ['#6366f1','#8b5cf6','#ec4899','#f97316','#10b981','#f59e0b','#06b6d4','#ef4444','#84cc16','#64748b'];
  const ctx = document.getElementById('pie-chart').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderWidth: 0, hoverOffset: 6 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '62%', plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: 'Inter' }, padding: 12, usePointStyle: true } } } }
  });
}

function renderBar(data) {
  const months = [], incomes = [], expenses = [];
  for (let i = 5; i >= 0; i--) {
    let y = currentYear, m = currentMonth - i;
    while (m < 1) { m += 12; y--; }
    months.push(`${y}/${String(m).padStart(2,'0')}`);
    const txs = data.transactions.filter(t => { const d = new Date(t.date); return d.getFullYear()===y && (d.getMonth()+1)===m; });
    incomes.push(txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0));
    expenses.push(txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0));
  }
  const ctx = document.getElementById('bar-chart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar',
    data: { labels: months, datasets: [
      { label: '収入', data: incomes,  backgroundColor: 'rgba(16,185,129,.8)',  borderRadius: 6 },
      { label: '支出', data: expenses, backgroundColor: 'rgba(239,68,68,.8)',   borderRadius: 6 }
    ]},
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { font: { size: 11, family: 'Inter' }, padding: 12, usePointStyle: true } } }, scales: { y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,.04)' } }, x: { grid: { display: false } } } }
  });
}

// ===== 操作 =====
function addTransaction() {
  const date     = document.getElementById('tx-date').value;
  const amount   = parseInt(document.getElementById('tx-amount').value);
  const category = document.getElementById('tx-category').value;
  const note     = document.getElementById('tx-note').value.trim();
  if (!date || !amount || amount <= 0) { alert('日付と正の金額を入力してください'); return; }
  const data = getData();
  data.transactions.push({ id: Date.now().toString(), date, amount, category, note, type: currentType, user: currentUser });
  saveData(data);
  document.getElementById('tx-amount').value = '';
  document.getElementById('tx-note').value   = '';
  renderAll();
}

function deleteTx(id) {
  if (!confirm('この取引を削除しますか？')) return;
  const data = getData();
  data.transactions = data.transactions.filter(t => t.id !== id);
  saveData(data); renderAll();
}

function saveBudgets() {
  const data = getData();
  CATEGORIES_EXPENSE.forEach(cat => {
    const v = parseInt(document.getElementById('budget-' + cat).value) || 0;
    data.budgets[cat] = v;
  });
  saveData(data); renderAll();
  alert('予算を保存しました');
}

function changePin() {
  const old = document.getElementById('old-pin').value;
  const nw  = document.getElementById('new-pin').value;
  const cnf = document.getElementById('confirm-pin').value;
  const msg = document.getElementById('pin-change-msg');
  const data = getData();
  if (data.users[currentUser].pin !== old) { msg.className='msg-area text-danger'; msg.textContent='現在のPINが違います'; return; }
  if (!/^\d{4}$/.test(nw))                 { msg.className='msg-area text-danger'; msg.textContent='PINは4桁の数字です'; return; }
  if (nw !== cnf)                          { msg.className='msg-area text-danger'; msg.textContent='新しいPINが一致しません'; return; }
  data.users[currentUser].pin = nw;
  saveData(data);
  msg.className = 'msg-area text-success'; msg.textContent = 'PINを変更しました';
  ['old-pin','new-pin','confirm-pin'].forEach(id => document.getElementById(id).value = '');
}

function showTab(id) {
  const TABS = ['tab-main','tab-budget','tab-chart','tab-settings'];
  TABS.forEach(t => document.getElementById(t).style.display = t === id ? '' : 'none');
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', TABS[i] === id));
  if (id === 'tab-chart') renderCharts(getData());
}

// ===== モーダル =====
function openModal(id) {
  const el = document.getElementById(id);
  el.classList.add('open');
  document.body.style.overflow = 'hidden';
  if (id === 'userModal') renderUserSettings();
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

// ===== ユーザー設定 =====
function renderUserSettings() {
  const data = getData();
  const el = document.getElementById('user-settings-content');
  el.innerHTML = ['user1', 'user2'].map(uid => {
    const u = data.users[uid];
    const label = uid === 'user1' ? '👤 ユーザー1' : '👤 ユーザー2';
    return `
    <div class="user-setting-section">
      <div class="user-setting-title" id="user-title-${uid}">${escHtml(label)}（現在: ${escHtml(u.name)}）</div>
      <div class="user-setting-row">
        <div class="form-row">
          <label>表示名</label>
          <input type="text" id="name-${uid}" value="${escHtml(u.name)}" maxlength="20" placeholder="名前を入力" />
        </div>
        <button class="save-btn" onclick="updateUserName('${uid}')">保存</button>
      </div>
      <div id="name-msg-${uid}" class="msg-area"></div>
      <hr style="border:none;border-top:1px solid var(--border);margin:12px 0" />
      <div class="user-setting-title" style="font-size:.8rem;color:var(--muted);font-weight:600">PIN変更</div>
      <div class="user-setting-row">
        <div class="form-row">
          <label>現在のPIN</label>
          <input type="password" id="upin-old-${uid}" maxlength="4" placeholder="現在の4桁" />
        </div>
        <div class="form-row">
          <label>新しいPIN</label>
          <input type="password" id="upin-new-${uid}" maxlength="4" placeholder="新しい4桁" />
        </div>
        <div class="form-row">
          <label>確認</label>
          <input type="password" id="upin-cfm-${uid}" maxlength="4" placeholder="再入力" />
        </div>
        <button class="save-btn" onclick="updateUserPin('${uid}')">変更</button>
      </div>
      <div id="pin-msg-${uid}" class="msg-area"></div>
    </div>`;
  }).join('');
}

function updateUserName(uid) {
  const name = document.getElementById('name-' + uid).value.trim();
  const msg  = document.getElementById('name-msg-' + uid);
  if (!name) { msg.className = 'msg-area text-danger'; msg.textContent = '名前を入力してください'; return; }
  const data = getData();
  data.users[uid].name = name;
  saveData(data);
  msg.className = 'msg-area text-success'; msg.textContent = '名前を変更しました';
  // タイトルのみ更新（再描画するとメッセージが即消えるため）
  const label = uid === 'user1' ? '👤 ユーザー1' : '👤 ユーザー2';
  const titleEl = document.getElementById('user-title-' + uid);
  if (titleEl) titleEl.textContent = label + '（現在: ' + name + '）';
  if (uid === currentUser) {
    document.getElementById('current-user-label').textContent = name;
    document.getElementById('btn-' + uid).textContent = '👤 ' + name;
  }
}

function updateUserPin(uid) {
  const oldPin = document.getElementById('upin-old-' + uid).value;
  const newPin = document.getElementById('upin-new-' + uid).value;
  const cfmPin = document.getElementById('upin-cfm-' + uid).value;
  const msg    = document.getElementById('pin-msg-' + uid);
  const data   = getData();
  if (data.users[uid].pin !== oldPin) { msg.className = 'msg-area text-danger'; msg.textContent = '現在のPINが違います'; return; }
  if (!/^\d{4}$/.test(newPin))        { msg.className = 'msg-area text-danger'; msg.textContent = 'PINは4桁の数字で入力してください'; return; }
  if (newPin !== cfmPin)              { msg.className = 'msg-area text-danger'; msg.textContent = '新しいPINが一致しません'; return; }
  data.users[uid].pin = newPin;
  saveData(data);
  msg.className = 'msg-area text-success'; msg.textContent = 'PINを変更しました';
  document.getElementById('upin-old-' + uid).value = '';
  document.getElementById('upin-new-' + uid).value = '';
  document.getElementById('upin-cfm-' + uid).value = '';
}
</script>
</body>
